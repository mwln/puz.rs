# Selects the Rust toolchain used for local development and any CI job that
# does not request a specific toolchain explicitly. Tracking `stable` keeps
# `cargo clippy`, `cargo fmt`, and build results consistent between developer
# machines and CI (both resolve to the current stable at any point in time).
#
# The CI test matrix installs stable / beta / 1.78.0 (MSRV) explicitly via
# `dtolnay/rust-toolchain`, whose explicit `toolchain:` input overrides this
# file, so multi-version testing is preserved.
[toolchain]
channel = "stable"
components = ["clippy", "rustfmt"]
