name: ci
on:
  push:
    branches: [main]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly on Monday
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
jobs:
  test:
    name: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta]
        include:
          - os: ubuntu-latest
            rust: "1.88.0"
    steps:
      - uses: actions/checkout@v7
      - name: install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-cache"
      # Use `+${{ matrix.rust }}` on every cargo call so the matrix toolchain
      # is honored instead of the version pinned in rust-toolchain.toml. This
      # is what keeps the 1.88.0 (MSRV) leg of the matrix meaningful.
      - name: check compilation
        run: cargo +${{ matrix.rust }} check --all --all-targets
      - name: run tests
        run: cargo +${{ matrix.rust }} test --all
      - name: test parse package features
        run: |
          cargo +${{ matrix.rust }} test -p puz-parse --no-default-features
          cargo +${{ matrix.rust }} test -p puz-parse --features json
      - name: test cli functionality
        run: cargo +${{ matrix.rust }} run --bin puz -- --help
  library-msrv:
    name: library MSRV (1.85.0)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
      - name: cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-cache"
      # The puz-parse library holds a lower MSRV than the workspace (the CLI's
      # comfy-table dependency drives the 1.88 workspace floor). Verify the
      # library alone still builds and tests on its own 1.85 floor.
      - name: check + test library at its MSRV
        run: |
          cargo +1.85.0 check -p puz-parse --all-features
          cargo +1.85.0 test -p puz-parse --no-default-features
          cargo +1.85.0 test -p puz-parse --features json
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-cache"
      - name: check formatting
        run: cargo fmt --all -- --check
      - name: run clippy
        run: |
          cargo clippy --all --all-targets -- -D warnings -D clippy::all
          cargo clippy -p puz-parse --no-default-features -- -D warnings -D clippy::all
          cargo clippy -p puz-parse --features json -- -D warnings -D clippy::all
  minimal:
    name: minimal versions
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7
      - name: install rust
        uses: dtolnay/rust-toolchain@nightly
      - name: cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-cache"
      - name: test minimal versions
        # `-Z minimal-versions` requires nightly, so invoke it explicitly with
        # `+nightly` to override the pinned toolchain in rust-toolchain.toml.
        run: |
          cargo +nightly generate-lockfile -Z minimal-versions
          cargo +nightly check --locked --workspace
  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: install rust
        uses: dtolnay/rust-toolchain@stable
      - name: cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-cache"
      - name: check documentation
        run: cargo doc --no-deps --all --all-features
        env:
          RUSTDOCFLAGS: -D warnings
  cross-compile:
    name: cross-compile ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name != 'schedule' && (github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[cross-compile]') || github.event_name == 'pull_request')
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - x86_64-pc-windows-msvc
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v7
      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: test cross-compilation
        run: cargo check --target ${{ matrix.target }} --workspace
